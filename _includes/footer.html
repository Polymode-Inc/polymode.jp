        <p style="color: var(--color-text-muted); margin-top: var(--spacing-sm);">
          {{ site.company.tagline }}<br>
          {{ site.company.tagline_sub }}
        </p>
      </div>

      <div class="footer-section">
        <h3>サイトマップ</h3>
        <ul>
          <li><a href="{{ site.baseurl }}/">ホーム</a></li>
          <li><a href="{{ site.baseurl }}/about.html">会社概要</a></li>
          <li><a href="{{ site.baseurl }}/services.html">事業内容</a></li>
          <li><a href="{{ site.baseurl }}/ir/">IR情報</a></li>
        </ul>
      </div>

      <div class="footer-section">
        <h3>事業内容</h3>
        <ul>
          <li><a href="{{ site.baseurl }}/services.html#tech">IT技術開発</a></li>
          <!--
          <li><a href="{{ site.baseurl }}/services.html#investment">投資・資産管理</a></li>
          <li><a href="{{ site.baseurl }}/services.html#realestate">不動産事業</a></li>

    </div>

    <div class="footer-bottom">
      <small>&copy; <span id="year"></span> {{ site.company.name_en }} All rights reserved.</small>
    </div>
  </div>
</footer>

<script>
  // 年を自動更新
  document.getElementById('year').textContent = new Date().getFullYear();

  // スクロール時のナビゲーションバー
  window.addEventListener('scroll', function() {
    const navbar = document.querySelector('.navbar');
    if (window.scrollY > 50) {
      navbar.style.background = 'rgba(26, 31, 58, 0.95)';
    } else {
      navbar.style.background = 'rgba(26, 31, 58, 0.8)';
    }
  });

  // モバイルメニュートグル
  const navbarToggle = document.querySelector('.navbar-toggle');
  const navbarMenu = document.querySelector('.navbar-menu');

  navbarToggle.addEventListener('click', function() {
    this.classList.toggle('active');
    navbarMenu.classList.toggle('active');
    const isExpanded = this.classList.contains('active');
    this.setAttribute('aria-expanded', isExpanded);
  });

  const menuLinks = document.querySelectorAll('.navbar-menu a');
  menuLinks.forEach(link => {
    link.addEventListener('click', function() {
      navbarToggle.classList.remove('active');
      navbarMenu.classList.remove('active');
      navbarToggle.setAttribute('aria-expanded', 'false');
    });
  });
</script>
